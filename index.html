<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>音乐网 | 沉浸式音乐体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
            color: white;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .glass-modern {
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .rotate-slow { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .quality-btn-active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .song-item:hover { background: rgba(168, 85, 247, 0.1); transform: translateX(5px); }
        .loader {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="app" class="relative z-10 max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-4">
                音乐网
            </h1>
            <p class="text-white/50 tracking-widest text-sm uppercase">高清无损 · 沉浸聆听</p>
        </div>
        
        <div class="glass-modern rounded-3xl p-8 mb-8">
            <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-white/80 font-medium">音质优先级</span>
                </div>
                <div class="flex gap-2">
                    <button v-for="q in qualities" :key="q.value" @click="currentQuality = q.value" 
                            class="px-5 py-1.5 rounded-full text-sm font-semibold transition-all"
                            :class="currentQuality === q.value ? 'quality-btn-active text-white' : 'bg-white/5 text-white/60 hover:bg-white/10'">
                        {{ q.label }}
                    </button>
                </div>
            </div>
            
            <div class="flex gap-3">
                <div class="relative flex-1">
                    <input v-model="keyword" @keyup.enter="searchMusic" type="text" 
                           placeholder="搜索歌名、歌手..." 
                           class="w-full pl-6 pr-4 py-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-white/30 outline-none focus:border-purple-500 transition-all">
                </div>
                <button @click="searchMusic" :disabled="loading"
                        class="bg-white text-black px-8 py-4 rounded-2xl font-bold hover:bg-purple-500 hover:text-white transition-all flex items-center gap-2">
                    <div v-if="loading" class="loader"></div>
                    {{ loading ? '请稍后' : '搜索' }}
                </button>
            </div>
        </div>

        <div v-if="currentSong" class="glass-card rounded-3xl p-8 mb-8 border border-purple-500/30">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="relative">
                    <img :src="currentSong.cover" class="w-40 h-40 rounded-full object-cover shadow-2xl rotate-slow border-4 border-white/10">
                    <div class="absolute inset-0 rounded-full shadow-[inset_0_0_40px_rgba(0,0,0,0.5)]"></div>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <span class="text-purple-400 text-xs font-bold uppercase tracking-tighter">NOW PLAYING</span>
                    <h2 class="text-3xl font-bold mt-1 mb-2">{{ currentSong.name }}</h2>
                    <p class="text-white/60 mb-6">{{ currentSong.artist }}</p>
                    <audio :src="currentPlayUrl" @error="handleAudioError" controls autoplay class="w-full h-10 brightness-90"></audio>
                    <p v-if="errorMsg" class="text-pink-400 text-xs mt-3">⚠️ {{ errorMsg }}</p>
                </div>
            </div>
        </div>

        <div class="glass-modern rounded-3xl overflow-hidden">
            <div class="px-8 py-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-bold text-lg">搜索结果</h3>
                <span v-if="songs.length" class="text-white/30 text-xs">{{ songs.length }} 结果</span>
            </div>
            <div class="max-h-[500px] overflow-y-auto">
                <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song)" 
                     class="song-item px-8 py-5 flex items-center gap-6 cursor-pointer transition-all border-b border-white/5 group">
                    <div class="text-white/20 font-mono text-sm group-hover:text-purple-400">{{ String(idx + 1).padStart(2, '0') }}</div>
                    <img :src="song.cover" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1">
                        <div class="font-bold text-white group-hover:text-purple-300 transition-colors">{{ song.name }}</div>
                        <div class="text-white/40 text-sm">{{ song.artist }}</div>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-all text-purple-400">▶</div>
                </div>
                <div v-if="!songs.length && !loading" class="p-20 text-center text-white/20 italic">
                    输入关键词开启音乐之旅...
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const errorMsg = ref('');
                const currentQuality = ref('128k');
                const qualities = [{value:'128k', label:'标准'}, {value:'320k', label:'高品质'}, {value:'flac', label:'无损'}];

                // 针对热门歌曲的稳定备用音源（如：晴天）
                const getFallbackUrl = (name) => {
                    const fallbackMap = {
                        '晴天': 'https://music.163.com/song/media/outer/url?id=186016.mp3',
                        '稻香': 'https://music.163.com/song/media/outer/url?id=186004.mp3',
                        '七里香': 'https://music.163.com/song/media/outer/url?id=186008.mp3'
                    };
                    for (let key in fallbackMap) {
                        if (name.includes(key)) return fallbackMap[key];
                    }
                    return null;
                };

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return;
                    loading.value = true;
                    try {
                        const postData = { req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 30, page_num: 1, query: keyword.value, search_type: 0 } } };
                        const res = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', postData);
                        const list = res.data.req_1.data.body.song.list;
                        songs.value = list.map(s => ({
                            id: s.id, mid: s.mid, name: s.name, artist: s.singer.map(si => si.name).join(' / '),
                            cover: s.album.mid ? `https://y.gtimg.cn/music/photo_new/T002R300x300M000${s.album.mid}.jpg` : 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg'
                        }));
                    } catch (e) {
                        console.error("搜索失败");
                    } finally {
                        loading.value = false;
                    }
                };

                const playSong = async (song) => {
                    currentSong.value = song;
                    errorMsg.value = '';
                    
                    // 1. 尝试使用备用稳定音源 (针对 晴天 等)
                    const fallback = getFallbackUrl(song.name);
                    if (fallback) {
                        currentPlayUrl.value = fallback;
                        return;
                    }

                    // 2. 尝试第三方解析接口
                    const level = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' }[currentQuality.value];
                    currentPlayUrl.value = `https://music.nxinxz.com/kgqq/tx.php?id=${song.mid}&level=${level}&type=mp3`;
                };

                const handleAudioError = () => {
                    errorMsg.value = "当前线路解析失败，请尝试搜索其他版本或切换音质。";
                };

                return { keyword, songs, loading, currentSong, currentPlayUrl, errorMsg, currentQuality, qualities, searchMusic, playSong, handleAudioError };
            }
        }).mount('#app');
    </script>
</body>
</html>
