<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>音乐搜索器 | 纯净无损体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://fastly.jsdelivr.net/gh/Huibq/keep-alive/render_api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            min-height: 100vh; color: white; position: relative;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem;
        }
        .lyric-box {
            height: 220px; overflow: hidden; position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        .lyric-move { transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1); text-align: center; }
        .lyric-line { padding: 8px 0; color: rgba(255,255,255,0.3); font-size: 0.95rem; }
        .lyric-line.active { color: #c084fc; font-size: 1.15rem; font-weight: 700; text-shadow: 0 0 10px rgba(192, 132, 252, 0.4); }
        .song-item { transition: all 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .song-item:hover { background: rgba(255,255,255,0.05); padding-left: 10px; }
    </style>
</head>
<body>
    <div id="app" class="relative z-10 max-w-4xl mx-auto px-4 py-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tighter bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">音乐播放器</h1>
            <p class="text-white/30 text-xs mt-2 uppercase tracking-widest">基于 Huibq 最新源 · 已修复 404</p>
        </div>
        
        <div class="glass-box p-5 mb-6">
            <div class="flex gap-2">
                <input v-model="keyword" @keyup.enter="searchMusic" type="text" placeholder="搜索 歌手+歌名（如：周杰伦 晴天）" 
                       class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-purple-500 text-white text-sm">
                <button @click="searchMusic" :disabled="loading" class="bg-white text-black px-6 py-3 rounded-xl font-bold hover:bg-purple-500 hover:text-white transition-all">
                    {{ loading ? '...' : '搜索' }}
                </button>
            </div>
        </div>

        <div v-if="currentSong" class="glass-box p-8 mb-6 border-l-4 border-purple-500 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="shrink-0">
                    <img :src="currentSong.cover" class="w-40 h-40 rounded-2xl shadow-2xl object-cover border-2 border-white/5">
                </div>
                <div class="flex-1 w-full text-center md:text-left">
                    <h2 class="text-2xl font-bold mb-1">{{ currentSong.name }}</h2>
                    <p class="text-white/40 mb-5 text-sm">{{ currentSong.artist }}</p>
                    <audio id="audioPlayer" :src="currentPlayUrl" @timeupdate="updateLyric" @error="handlePlayError" controls autoplay class="w-full h-10 mb-4"></audio>
                    <div v-if="status" class="text-xs text-purple-400 italic">{{ status }}</div>
                </div>
                <div class="lyric-box w-full md:w-64">
                    <div class="lyric-move" :style="{ transform: `translateY(${lyricOffset}px)` }">
                        <div v-for="(line, index) in parsedLyrics" :key="index"
                             class="lyric-line" :class="{ active: currentLyricIndex === index }">
                            {{ line.text }}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-box overflow-hidden">
            <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song)" 
                 class="song-item p-4 flex items-center gap-4 cursor-pointer group">
                <div class="text-white/10 font-mono text-xs w-5">{{ idx + 1 }}</div>
                <img :src="song.cover" class="w-10 h-10 rounded-lg object-cover">
                <div class="flex-1 overflow-hidden">
                    <div class="font-bold text-sm truncate group-hover:text-purple-400">{{ song.name }}</div>
                    <div class="text-white/30 text-xs truncate">{{ song.artist }}</div>
                </div>
                <div class="opacity-0 group-hover:opacity-100 transition-all text-purple-500">▶</div>
            </div>
            <div v-if="!songs.length && !loading" class="p-16 text-center text-white/10 italic text-sm">请输入关键词开始搜索</div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const status = ref('');
                const parsedLyrics = ref([]);
                const currentLyricIndex = ref(0);
                const lyricOffset = ref(90);
                const retryCount = ref(0);

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return;
                    loading.value = true;
                    try {
                        const postData = { req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 25, page_num: 1, query: keyword.value, search_type: 0 } } };
                        const res = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', postData);
                        const list = res.data.req_1.data.body.song.list || [];
                        songs.value = list.map(s => ({
                            id: s.id, mid: s.mid, name: s.name, artist: s.singer.map(si => si.name).join(' / '),
                            cover: `https://y.gtimg.cn/music/photo_new/T002R300x300M000${s.album.mid}.jpg`
                        }));
                    } finally { loading.value = false; }
                };

                const playSong = async (song) => {
                    currentSong.value = song;
                    retryCount.value = 0;
                    status.value = '正在切换稳定线路...';
                    parsedLyrics.value = [];
                    currentLyricIndex.value = 0;
                    
                    fetchSource(song);
                    fetchLyrics(song.mid);
                };

                const fetchSource = (song) => {
                    // 彻底舍弃 404 的 nxinxz 接口，换用 Huibq 插件常用的咪咕/备用源
                    const encodedName = encodeURIComponent(song.name + ' ' + song.artist);
                    const sources = [
                        // 线路 1: 咪咕源 (针对 晴天 等版权歌极稳)
                        `https://api.paugram.com/music/?source=migu&name=${encodedName}`,
                        // 线路 2: 梨花源 (备用搜索接口)
                        `https://api.lihuaboke.com/api/music/migu?name=${encodeURIComponent(song.name)}`,
                        // 线路 3: 网易云备用
                        `https://api.uomg.com/api/rand.music?format=json&name=${encodedName}`
                    ];
                    currentPlayUrl.value = sources[retryCount.value];
                };

                const handlePlayError = () => {
                    if (retryCount.value < 2) {
                        retryCount.value++;
                        status.value = `线路 ${retryCount.value} 失败，正在自动尝试备用线路...`;
                        fetchSource(currentSong.value);
                    } else {
                        status.value = '解析失败，请尝试搜索其他版本';
                    }
                };

                const fetchLyrics = async (mid) => {
                    try {
                        const res = await axios.get(`https://api.lihuaboke.com/api/music/lrc?mid=${mid}`);
                        if (res.data && res.data.lrc) {
                            const lines = res.data.lrc.split('\n');
                            const result = [];
                            const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
                            lines.forEach(item => {
                                const match = timeExp.exec(item);
                                if (match) {
                                    const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 100;
                                    const text = item.replace(timeExp, '').trim();
                                    if (text) result.push({ time, text });
                                }
                            });
                            parsedLyrics.value = result;
                        }
                    } catch (e) { console.warn("歌词获取失败"); }
                };

                const updateLyric = (e) => {
                    const currentTime = e.target.currentTime;
                    for (let i = 0; i < parsedLyrics.value.length; i++) {
                        if (currentTime > parsedLyrics.value[i].time && (!parsedLyrics.value[i+1] || currentTime < parsedLyrics.value[i+1].time)) {
                            if (currentLyricIndex.value !== i) {
                                currentLyricIndex.value = i;
                                lyricOffset.value = 90 - (i * 37);
                            }
                            break;
                        }
                    }
                };

                return { keyword, songs, loading, currentSong, currentPlayUrl, status, parsedLyrics, currentLyricIndex, lyricOffset, searchMusic, playSong, updateLyric, handlePlayError };
            }
        }).mount('#app');
    </script>
</body>
</html>
