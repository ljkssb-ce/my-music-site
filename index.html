<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>音乐网 | 沉浸式音乐体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .marquee-container {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 10px 0; z-index: 100;
            overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .marquee {
            white-space: nowrap; display: inline-block;
            animation: marquee 22s linear infinite; padding-left: 100%;
        }
        .marquee a {
            color: #fff; font-weight: bold; text-decoration: none;
            padding: 0 30px; font-size: 16px; display: inline-block;
            background: rgba(168, 85, 247, 0.3); border-radius: 30px;
            margin: 0 5px; transition: all 0.2s;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .glass-modern {
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .rotate-slow { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }
        .loader {
            width: 40px; height: 40px;
            border: 3px solid rgba(168, 85, 247, 0.3);
            border-top-color: #a855f7; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .quality-btn-active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .main-content { padding-top: 85px; }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="https://kelayun.notepin.co" target="_blank" rel="noopener noreferrer">🔥 最低月付2元1000G机场推荐 / 解锁奈飞.TikTok / 不限速不限设备</a>
            <a href="https://kelayun.notepin.co" target="_blank" rel="noopener noreferrer">🔥 最低月付2元1000G机场推荐 / 解锁奈飞.TikTok / 不限速不限设备</a>
        </div>
    </div>

    <div id="app" class="relative z-10 max-w-6xl mx-auto px-4 py-6 md:py-8 main-content">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-bold bg-gradient-to-r from-purple-400 via-pink-500 to-purple-400 bg-clip-text text-transparent mb-4">裤佬音乐网</h1>
            <p class="text-white/60">基于QQ音乐 · 高清无损 · 沉浸聆听</p>
        </div>
        
        <div class="glass-modern rounded-2xl p-6 mb-6">
            <div class="flex justify-between items-center mb-6">
                <div class="text-white/80 flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>音质选择</div>
                <div class="flex gap-3">
                    <button v-for="q in qualities" :key="q.value" @click="currentQuality = q.value" 
                            class="px-5 py-2 rounded-full text-white transition-all"
                            :class="currentQuality === q.value ? 'quality-btn-active' : 'bg-white/10'">{{ q.label }}</button>
                </div>
            </div>
            <div class="flex gap-4">
                <input v-model="keyword" @keyup.enter="searchMusic" type="text" placeholder="输入歌名、歌手..." 
                       class="flex-1 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white outline-none focus:border-purple-500">
                <button @click="searchMusic" class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3 rounded-xl font-bold">🎵 搜索</button>
            </div>
        </div>

        <div v-if="currentSong" class="glass-card rounded-2xl p-6 mb-6">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img :src="currentSong.cover" class="w-32 h-32 rounded-2xl rotate-slow">
                <div class="flex-1">
                    <h2 class="text-2xl font-bold text-white">{{ currentSong.name }}</h2>
                    <p class="text-white/70">{{ currentSong.artist }}</p>
                    <audio :src="currentPlayUrl" controls autoplay class="w-full mt-4"></audio>
                </div>
            </div>
        </div>

        <div class="glass-modern rounded-2xl overflow-hidden">
            <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song)" 
                 class="p-4 flex items-center gap-4 hover:bg-white/5 cursor-pointer border-b border-white/5">
                <div class="text-white/30 w-8">{{ idx + 1 }}</div>
                <img :src="song.cover" class="w-12 h-12 rounded-lg">
                <div class="flex-1">
                    <div class="text-white font-medium">{{ song.name }}</div>
                    <div class="text-white/50 text-sm">{{ song.artist }}</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const currentQuality = ref('128k');
                const qualities = [{value:'128k', label:'标准'}, {value:'320k', label:'高品质'}, {value:'flac', label:'无损'}];

                const searchMusic = async () => {
                    const postData = { req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 20, page_num: 1, query: keyword.value, search_type: 0 } } };
                    const data = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', postData);
                    const list = data.data.req_1.data.body.song.list;
                    songs.value = list.map(s => ({
                        id: s.id, mid: s.mid, name: s.name, artist: s.singer.map(si => si.name).join('/'),
                        cover: `https://y.gtimg.cn/music/photo_new/T002R300x300M000${s.album.mid}.jpg`
                    }));
                };

                const playSong = async (song) => {
                    currentSong.value = song;
                    const level = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' }[currentQuality.value];
                    currentPlayUrl.value = `https://music.nxinxz.com/kgqq/tx.php?id=${song.mid}&level=${level}&type=mp3`;
                };

                return { keyword, songs, currentSong, currentPlayUrl, currentQuality, qualities, searchMusic, playSong };
            }
        }).mount('#app');
    </script>
</body>
</html>
